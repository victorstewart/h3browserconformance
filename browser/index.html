<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>H3 Browser Conformance Baton</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
    }

    body {
      margin: 0;
      background: Canvas;
      color: CanvasText;
    }

    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 650;
      letter-spacing: 0;
    }

    form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 16px;
    }

    label {
      display: grid;
      gap: 4px;
      font-size: 13px;
      font-weight: 600;
    }

    input {
      min-width: 0;
      border: 1px solid color-mix(in srgb, CanvasText 28%, transparent);
      border-radius: 6px;
      padding: 9px 10px;
      font: inherit;
      background: Canvas;
      color: CanvasText;
    }

    button {
      border: 1px solid color-mix(in srgb, CanvasText 30%, transparent);
      border-radius: 6px;
      padding: 9px 14px;
      font: inherit;
      font-weight: 650;
      background: ButtonFace;
      color: ButtonText;
      cursor: pointer;
    }

    button:disabled {
      cursor: progress;
      opacity: 0.7;
    }

    dl {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 0 0 16px;
    }

    .metric {
      border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);
      border-radius: 8px;
      padding: 10px;
      min-width: 0;
    }

    dt {
      margin: 0 0 6px;
      font-size: 12px;
      color: color-mix(in srgb, CanvasText 68%, transparent);
    }

    dd {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    pre {
      min-height: 260px;
      margin: 0;
      border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);
      border-radius: 8px;
      padding: 12px;
      overflow: auto;
      white-space: pre-wrap;
      background: color-mix(in srgb, Canvas 94%, CanvasText);
      font: 13px/1.45 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    [data-result="pass"] #state {
      color: #116329;
    }

    [data-result="fail"] #state {
      color: #a11922;
    }

    @media (max-width: 720px) {
      main {
        padding: 16px;
      }

      form,
      dl {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>H3 Browser Conformance Baton</h1>
    <form id="controls">
      <label>
        Endpoint
        <input id="target" name="target" type="url" autocomplete="off" spellcheck="false">
      </label>
      <button id="run" type="submit">Run</button>
    </form>
    <dl>
      <div class="metric">
        <dt>State</dt>
        <dd id="state">idle</dd>
      </div>
      <div class="metric">
        <dt>Received</dt>
        <dd id="received">0</dd>
      </div>
      <div class="metric">
        <dt>Sent</dt>
        <dd id="sent">0</dd>
      </div>
      <div class="metric">
        <dt>Datagrams</dt>
        <dd id="datagrams">0</dd>
      </div>
    </dl>
    <pre id="log" aria-live="polite"></pre>
  </main>
  <script src="webtransport-baton.js"></script>
</body>
</html>
